<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novo Registro</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <div class="brand">
          <span class="brand-icon">⛽</span>
          <span>FuelTracker</span>
        </div>
        <p class="eyebrow">Abastecimento</p>
        <h1>Novo registro</h1>
        <p class="subtitle">Registre seu abastecimento com facilidade e mantenha o controle das despesas.</p>
      </div>
      <nav class="top-nav">
        <a href="index.html">Início</a>
        <a href="new_entry.html">Novo registro</a>
        <a href="vehicles.html">Veículos</a>
        <span id="userDisplay" style="font-size: 0.9rem; color: var(--foreground-muted); margin: 0 1rem;"></span>
        <button id="logoutBtn">Sair</button>
      </nav>
    </header>

    <section class="form-section">
      <div class="form-card">
        <div class="form-card-header">
          <div>
            <p class="eyebrow">Novo registro</p>
            <h2>Adicionar abastecimento</h2>
          </div>
        </div>
        <form id="fuelForm">
          <div class="grid-2">
            <label>
              Data
              <input type="date" id="date" required />
            </label>
            <label>
              Veículo
              <select id="vehicleId" required>
                <option value="">Selecione o veículo</option>
              </select>
            </label>
          </div>
          <div class="grid-2">
            <label>
              KM atual
              <input type="number" inputmode="decimal" id="odometer" min="0" step="0.1" required />
            </label>
            <label>
              Litros
              <input type="number" inputmode="decimal" id="liters" min="0" step="0.01" required />
            </label>
          </div>
          <div class="grid-2">
            <label>
              Preço por litro
              <input type="number" inputmode="decimal" id="price" min="0" step="0.01" required />
            </label>
          </div>
          <label>
            Observações
            <input type="text" id="notes" placeholder="Opcional" />
          </label>
          <div class="button-row">
            <button type="submit">Salvar</button>
            <button type="button" id="cancelEdit" class="ghost-button">Cancelar</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
