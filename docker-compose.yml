version: '3.8'

services:
  fuel-tracker:
    build: .
    ports:
      - "8080:80"
    container_name: fuel-consumption-tracker
    restart: unless-stopped
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./new_entry.html:/usr/share/nginx/html/new_entry.html:ro
      - ./vehicles.html:/usr/share/nginx/html/vehicles.html:ro
      - ./script.js:/usr/share/nginx/html/script.js:ro
      - ./styles.css:/usr/share/nginx/html/styles.css:ro
